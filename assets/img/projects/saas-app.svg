<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1e38"/>
      <stop offset="55%" stop-color="#1a1230"/>
      <stop offset="100%" stop-color="#0a1626"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#f06292" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#f06292" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#glow)"/>

  <!-- browser window -->
  <g transform="translate(120,70)">
    <rect width="560" height="310" rx="12" fill="#0f2248" stroke="#1c3a5c" stroke-width="1.5"/>
    <rect width="560" height="34" rx="12" fill="#132a44"/>
    <circle cx="22" cy="17" r="5.5" fill="#f06292" opacity=".8"/>
    <circle cx="40" cy="17" r="5.5" fill="#ffb74d" opacity=".8"/>
    <circle cx="58" cy="17" r="5.5" fill="#22d3a4" opacity=".8"/>
    <rect x="90" y="9" width="200" height="16" rx="8" fill="#0a1626"/>
    <text x="100" y="21" font-family="JetBrains Mono, monospace" font-size="10" fill="#5a7a90">app.saas.io/dashboard</text>

    <!-- sidebar -->
    <rect x="0" y="34" width="130" height="276" fill="#0c1e38"/>
    <g fill="#5a7a90">
      <rect x="20" y="56" width="90" height="10" rx="3" fill="#00d0e8" opacity="0.7"/>
      <rect x="20" y="86" width="70" height="8" rx="3"/>
      <rect x="20" y="108" width="70" height="8" rx="3"/>
      <rect x="20" y="130" width="70" height="8" rx="3"/>
    </g>

    <!-- dashboard cards -->
    <g transform="translate(150,56)">
      <rect width="120" height="70" rx="8" fill="#00d0e8" opacity="0.10" stroke="#00d0e8" stroke-width="1.2"/>
      <text x="12" y="24" font-family="JetBrains Mono, monospace" font-size="10" fill="#8fb8cc">MRR</text>
      <text x="12" y="50" font-family="JetBrains Mono, monospace" font-size="18" fill="#00d0e8" font-weight="700">$12.4k</text>

      <rect x="136" width="120" height="70" rx="8" fill="#22d3a4" opacity="0.10" stroke="#22d3a4" stroke-width="1.2"/>
      <text x="148" y="24" font-family="JetBrains Mono, monospace" font-size="10" fill="#8fecc7">USERS</text>
      <text x="148" y="50" font-family="JetBrains Mono, monospace" font-size="18" fill="#22d3a4" font-weight="700">1,204</text>

      <rect x="272" width="120" height="70" rx="8" fill="#f06292" opacity="0.10" stroke="#f06292" stroke-width="1.2"/>
      <text x="284" y="24" font-family="JetBrains Mono, monospace" font-size="10" fill="#f3b8cc">CHURN</text>
      <text x="284" y="50" font-family="JetBrains Mono, monospace" font-size="18" fill="#f06292" font-weight="700">1.8%</text>
    </g>

    <!-- bar chart -->
    <g transform="translate(150,150)">
      <rect width="392" height="130" rx="8" fill="#0c1e38" stroke="#1c3a5c" stroke-width="1.2"/>
      <g fill="#4fc3f7">
        <rect x="24" y="70" width="26" height="45"/>
        <rect x="64" y="50" width="26" height="65"/>
        <rect x="104" y="80" width="26" height="35"/>
        <rect x="144" y="35" width="26" height="80"/>
        <rect x="184" y="55" width="26" height="60"/>
        <rect x="224" y="20" width="26" height="95"/>
        <rect x="264" y="45" width="26" height="70"/>
        <rect x="304" y="60" width="26" height="55"/>
        <rect x="344" y="30" width="26" height="85"/>
      </g>
    </g>
  </g>
</svg>
