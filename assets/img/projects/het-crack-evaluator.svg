<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1e38"/>
      <stop offset="55%" stop-color="#152616"/>
      <stop offset="100%" stop-color="#0a1626"/>
    </linearGradient>
    <radialGradient id="glow" cx="60%" cy="55%" r="65%">
      <stop offset="0%" stop-color="#ffb74d" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffb74d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#glow)"/>

  <!-- axes -->
  <g stroke="#2e4a5c" stroke-width="1.5">
    <line x1="90" y1="60" x2="90" y2="360"/>
    <line x1="90" y1="360" x2="710" y2="360"/>
  </g>
  <text x="55" y="65" font-family="JetBrains Mono, monospace" font-size="11" fill="#5a7a90">stress</text>
  <text x="660" y="382" font-family="JetBrains Mono, monospace" font-size="11" fill="#5a7a90">strain</text>

  <!-- material curve rising then a jagged crack drop -->
  <path d="M90,340 C 200,300 300,180 400,120 L 415,205 L 430,110 L 445,230 L 460,150 C 520,190 600,230 710,250"
        fill="none" stroke="#22d3a4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- crack markers -->
  <g stroke="#ffb74d" stroke-width="2">
    <line x1="400" y1="120" x2="460" y2="150"/>
  </g>
  <circle cx="430" cy="110" r="6" fill="#ffb74d"/>
  <text x="440" y="95" font-family="JetBrains Mono, monospace" font-size="12" fill="#ffb74d" font-weight="700">crack onset</text>

  <!-- data points -->
  <g fill="#00d0e8">
    <circle cx="200" cy="300" r="4"/>
    <circle cx="300" cy="180" r="4"/>
    <circle cx="560" cy="205" r="4"/>
    <circle cx="650" cy="235" r="4"/>
  </g>

  <!-- HET sample icon -->
  <g transform="translate(560,80)">
    <circle r="42" fill="none" stroke="#4fc3f7" stroke-width="2" stroke-dasharray="4 4"/>
    <circle r="16" fill="none" stroke="#4fc3f7" stroke-width="2.4"/>
    <path d="M-16,0 A16,16 0 0 1 16,0" stroke="#f06292" stroke-width="2.6" fill="none"/>
    <text x="0" y="60" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#8fa8b8">HET SAMPLE</text>
  </g>
</svg>
