<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1e38"/>
      <stop offset="50%" stop-color="#0f2248"/>
      <stop offset="100%" stop-color="#0a1626"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#132a44"/>
      <stop offset="100%" stop-color="#0c1e38"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#00d0e8" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#00d0e8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M0 34 L34 34 L34 0" fill="none" stroke="#ffffff" stroke-opacity="0.045"/>
    </pattern>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#grid)"/>
  <rect width="800" height="450" fill="url(#glow)"/>

  <!-- code diff panel -->
  <g transform="translate(150,95)">
    <rect x="0" y="0" width="500" height="260" rx="14" fill="url(#panel)" stroke="#1c3a5c" stroke-width="1.5"/>
    <circle cx="24" cy="26" r="6" fill="#f06292" opacity=".8"/>
    <circle cx="46" cy="26" r="6" fill="#ffb74d" opacity=".8"/>
    <circle cx="68" cy="26" r="6" fill="#22d3a4" opacity=".8"/>
    <text x="250" y="30" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#5a7a90">pull_request.diff</text>

    <!-- diff lines -->
    <g font-family="JetBrains Mono, monospace" font-size="14">
      <rect x="20" y="58" width="460" height="22" fill="#22d3a4" opacity="0.10"/>
      <text x="30" y="74" fill="#22d3a4">+ def validate_token(req):</text>

      <rect x="20" y="84" width="460" height="22" fill="#22d3a4" opacity="0.10"/>
      <text x="30" y="100" fill="#22d3a4">+     if not req.headers.get("auth"):</text>

      <rect x="20" y="110" width="460" height="22" fill="#f06292" opacity="0.10"/>
      <text x="30" y="126" fill="#f06292" text-decoration="line-through" opacity="0.85">- token = req.query["token"]</text>

      <text x="30" y="152" fill="#5a7a90">  return verify(req)</text>
    </g>

    <!-- AI review badge -->
    <g transform="translate(330,175)">
      <rect x="0" y="0" width="150" height="60" rx="10" fill="#00d0e8" opacity="0.12" stroke="#00d0e8" stroke-width="1.4"/>
      <circle cx="26" cy="30" r="13" fill="none" stroke="#00d0e8" stroke-width="2.4"/>
      <path d="M20 30 L25 35 L33 24" fill="none" stroke="#00d0e8" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="48" y="26" font-family="JetBrains Mono, monospace" font-size="12" fill="#00d0e8" font-weight="700">AI REVIEW</text>
      <text x="48" y="42" font-family="JetBrains Mono, monospace" font-size="11" fill="#7fb8c8">no issues found</text>
    </g>
  </g>
</svg>
