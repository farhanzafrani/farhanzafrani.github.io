<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#231607"/>
      <stop offset="55%" stop-color="#16202f"/>
      <stop offset="100%" stop-color="#0a1626"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#ffb74d" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffb74d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M0 34 L34 34 L34 0" fill="none" stroke="#ffffff" stroke-opacity="0.045"/>
    </pattern>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#grid)"/>
  <rect width="800" height="450" fill="url(#glow)"/>

  <!-- issue -> agents flow -->
  <g stroke="#ffb74d" stroke-opacity="0.5" stroke-width="1.6">
    <line x1="140" y1="225" x2="255" y2="130"/>
    <line x1="140" y1="225" x2="255" y2="195"/>
    <line x1="140" y1="225" x2="255" y2="260"/>
    <line x1="140" y1="225" x2="255" y2="325"/>
  </g>

  <!-- issue card -->
  <g transform="translate(60,185)">
    <rect width="160" height="80" rx="10" fill="#0c1e38" stroke="#ffb74d" stroke-width="1.8"/>
    <circle cx="24" cy="24" r="8" fill="none" stroke="#ffb74d" stroke-width="2"/>
    <line x1="24" y1="17" x2="24" y2="24" stroke="#ffb74d" stroke-width="2"/>
    <circle cx="24" cy="30" r="0.8" fill="#ffb74d"/>
    <text x="42" y="28" font-family="JetBrains Mono, monospace" font-size="12" fill="#f0d0a0" font-weight="700">ISSUE #142</text>
    <text x="20" y="55" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#8fa0b0">"add rate limiting</text>
    <text x="20" y="68" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#8fa0b0">to the API"</text>
  </g>

  <!-- agent roles -->
  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#c9d8e8">
    <g transform="translate(270,110)">
      <rect width="180" height="40" rx="8" fill="#0f2248" stroke="#4fc3f7" stroke-width="1.6"/>
      <circle cx="20" cy="20" r="8" fill="none" stroke="#4fc3f7" stroke-width="2"/>
      <text x="38" y="24" fill="#a9d6ec">frontend agent</text>
    </g>
    <g transform="translate(270,175)">
      <rect width="180" height="40" rx="8" fill="#0f2248" stroke="#22d3a4" stroke-width="1.6"/>
      <circle cx="20" cy="20" r="8" fill="none" stroke="#22d3a4" stroke-width="2"/>
      <text x="38" y="24" fill="#a9ecd6">backend agent</text>
    </g>
    <g transform="translate(270,240)">
      <rect width="180" height="40" rx="8" fill="#0f2248" stroke="#b48af0" stroke-width="1.6"/>
      <circle cx="20" cy="20" r="8" fill="none" stroke="#b48af0" stroke-width="2"/>
      <text x="38" y="24" fill="#d9c6f7">devops agent</text>
    </g>
    <g transform="translate(270,305)">
      <rect width="180" height="40" rx="8" fill="#0f2248" stroke="#ffb74d" stroke-width="1.6"/>
      <circle cx="20" cy="20" r="8" fill="none" stroke="#ffb74d" stroke-width="2"/>
      <text x="38" y="24" fill="#f0d0a0">fullstack agent</text>
    </g>
  </g>

  <!-- PR output -->
  <g transform="translate(540,175)">
    <rect width="190" height="100" rx="10" fill="#0c1e38" stroke="#00d0e8" stroke-width="1.8"/>
    <path d="M20 25 v50 M20 25 a10 10 0 1 0 0 0.01 M20 75 a10 10 0 1 0 0 -0.01" fill="none" stroke="#00d0e8" stroke-width="2"/>
    <circle cx="20" cy="25" r="6" fill="#0c1e38" stroke="#00d0e8" stroke-width="2"/>
    <circle cx="20" cy="75" r="6" fill="#0c1e38" stroke="#00d0e8" stroke-width="2"/>
    <text x="40" y="30" font-family="JetBrains Mono, monospace" font-size="12" fill="#00d0e8" font-weight="700">PR opened</text>
    <text x="40" y="50" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#8fb8cc">+ rate_limiter.py</text>
    <text x="40" y="66" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#8fb8cc">+ tests passing</text>
    <text x="40" y="82" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#8fb8cc">ready to merge</text>
  </g>
  <line x1="450" y1="225" x2="540" y2="225" stroke="#00d0e8" stroke-opacity="0.6" stroke-width="1.6"/>
</svg>
